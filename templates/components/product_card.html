<article class="catalog-product-card">
    <a href="{% url 'catalog:product_detail' product.slug %}" class="catalog-product-image image-frame" {% if product.main_images %}style="--image-url: url('{{ product.main_images.0.image_url }}');"{% endif %}>
        {% if product.main_images %}
            <img src="{{ product.main_images.0.image_url }}" alt="{{ product.name }}">
        {% else %}
            {% with image=product.images.first %}
                {% if image %}
                    <img src="{{ image.image_url }}" alt="{{ product.name }}">
                {% else %}
                    <div class="image-placeholder">Нет изображения</div>
                {% endif %}
            {% endwith %}
        {% endif %}
    </a>

    <div class="catalog-card-meta">
        <p>{{ product.category.name }}</p>
    </div>

    <div class="catalog-card-bottom">
        <h3><a href="{% url 'catalog:product_detail' product.slug %}">{{ product.name }}</a></h3>
        <strong>{{ product.price_from_label }}</strong>
    </div>
</article>
